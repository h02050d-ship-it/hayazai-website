<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ファビコン候補「林」</title>
  <style>
    body { font-family: sans-serif; background: #f5f0e8; padding: 40px; }
    h1 { font-size: 1.1rem; color: #3d2b1f; margin-bottom: 8px; }
    p { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
    .grid { display: flex; flex-wrap: wrap; gap: 24px; }
    .item { background: #fff; border-radius: 12px; padding: 24px 20px; text-align: center; width: 130px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .item svg { display: block; margin: 0 auto 12px; }
    .num { font-size: 0.75rem; color: #7a5c3e; font-weight: 700; margin-bottom: 6px; }
    .desc { font-size: 0.7rem; color: #999; line-height: 1.4; }
  </style>
</head>
<body>
<h1>ファビコン候補「林」— 番号を教えてください</h1>
<p>漢字「林」をベースにした10案です。</p>

<div class="grid">

  <!-- 1: ダークブラウン・ゴールド文字 シンプル -->
  <div class="item">
    <div class="num">①</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#3d2b1f"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700" fill="#d4a96a" text-anchor="middle">林</text>
    </svg>
    <div class="desc">ダーク×ゴールド</div>
  </div>

  <!-- 2: ベージュ背景・ブラウン文字 -->
  <div class="item">
    <div class="num">②</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#f0e6d4"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700" fill="#3d2b1f" text-anchor="middle">林</text>
    </svg>
    <div class="desc">ベージュ×ダーク</div>
  </div>

  <!-- 3: 角丸なし・正方形 ゴールド文字 -->
  <div class="item">
    <div class="num">③</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="4" fill="#3d2b1f"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700" fill="#c8a87a" text-anchor="middle">林</text>
    </svg>
    <div class="desc">シャープ角</div>
  </div>

  <!-- 4: 円形 -->
  <div class="item">
    <div class="num">④</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" fill="#3d2b1f"/>
      <text x="32" y="46" font-family="serif" font-size="34" font-weight="700" fill="#d4a96a" text-anchor="middle">林</text>
    </svg>
    <div class="desc">丸形</div>
  </div>

  <!-- 5: 白背景・ゴールドフレーム -->
  <div class="item">
    <div class="num">⑤</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#fff"/>
      <rect x="3" y="3" width="58" height="58" rx="12" fill="none" stroke="#c8a87a" stroke-width="2.5"/>
      <text x="32" y="46" font-family="serif" font-size="34" font-weight="700" fill="#3d2b1f" text-anchor="middle">林</text>
    </svg>
    <div class="desc">白×ゴールド枠</div>
  </div>

  <!-- 6: グラデーション背景 -->
  <div class="item">
    <div class="num">⑥</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#5a3820"/>
          <stop offset="100%" stop-color="#2a1a0e"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#g1)"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700" fill="#d4a96a" text-anchor="middle">林</text>
    </svg>
    <div class="desc">グラデ背景</div>
  </div>

  <!-- 7: 枠付き文字 -->
  <div class="item">
    <div class="num">⑦</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#3d2b1f"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700"
        fill="none" stroke="#d4a96a" stroke-width="1.5" text-anchor="middle">林</text>
    </svg>
    <div class="desc">アウトライン</div>
  </div>

  <!-- 8: 小さめ文字＋下線装飾 -->
  <div class="item">
    <div class="num">⑧</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#3d2b1f"/>
      <text x="32" y="40" font-family="serif" font-size="28" font-weight="700" fill="#d4a96a" text-anchor="middle">林</text>
      <line x1="14" y1="48" x2="50" y2="48" stroke="#c8a87a" stroke-width="1.5" opacity="0.6"/>
    </svg>
    <div class="desc">文字＋下線</div>
  </div>

  <!-- 9: 金色背景・ダーク文字 -->
  <div class="item">
    <div class="num">⑨</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#c8a87a"/>
      <text x="32" y="46" font-family="serif" font-size="36" font-weight="700" fill="#3d2b1f" text-anchor="middle">林</text>
    </svg>
    <div class="desc">ゴールド背景</div>
  </div>

  <!-- 10: 文字＋年輪 -->
  <div class="item">
    <div class="num">⑩</div>
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="14" fill="#3d2b1f"/>
      <circle cx="32" cy="32" r="26" fill="none" stroke="#c8a87a" stroke-width="1" opacity="0.25"/>
      <circle cx="32" cy="32" r="20" fill="none" stroke="#c8a87a" stroke-width="1" opacity="0.2"/>
      <text x="32" y="46" font-family="serif" font-size="34" font-weight="700" fill="#d4a96a" text-anchor="middle">林</text>
    </svg>
    <div class="desc">林＋年輪</div>
  </div>

</div>
<p style="margin-top:32px;font-size:0.85rem;color:#7a5c3e;">番号を教えてもらえれば即反映します。</p>
</body>
</html>
