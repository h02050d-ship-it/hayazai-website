name: Deploy to Xserver

# 林材木店HP 自動デプロイ
# main へ push されると、自動的に Xserver の ~/hayazai.com/public_html/ へ rsync で配信される。
# 手動実行は GitHub の Actions タブから workflow_dispatch で可能。
# 詳細: docs/DEPLOY_AUTOMATION.md

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-xserver
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy banner
        run: |
          echo "::notice title=Deploy::🚀 Deploy started from commit ${{ github.sha }} on ${{ github.ref_name }} by ${{ github.actor }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Commit:  ${{ github.sha }}"
          echo "Actor:   ${{ github.actor }}"
          echo "Ref:     ${{ github.ref }}"

      - name: Verify required secrets are present
        run: |
          MISSING=0
          for var in XSERVER_HOST XSERVER_USER XSERVER_PORT XSERVER_PATH XSERVER_SSH_KEY; do
            # GitHub Actions では secrets を直接 shell から見られないため
            # ここでは事前展開された env で空文字判定する
            :
          done
          if [ -z "${HOST}" ] || [ -z "${USER}" ] || [ -z "${PORT}" ] || [ -z "${REMOTE_PATH}" ] || [ -z "${SSH_KEY}" ]; then
            echo "::error title=Missing secrets::必要な Secrets が登録されていません。docs/DEPLOY_AUTOMATION.md を参照して XSERVER_HOST / XSERVER_USER / XSERVER_PORT / XSERVER_PATH / XSERVER_SSH_KEY を登録してください。"
            echo "  XSERVER_HOST set: $([ -n "$HOST" ] && echo yes || echo NO)"
            echo "  XSERVER_USER set: $([ -n "$USER" ] && echo yes || echo NO)"
            echo "  XSERVER_PORT set: $([ -n "$PORT" ] && echo yes || echo NO)"
            echo "  XSERVER_PATH set: $([ -n "$REMOTE_PATH" ] && echo yes || echo NO)"
            echo "  XSERVER_SSH_KEY set: $([ -n "$SSH_KEY" ] && echo yes || echo NO)"
            exit 1
          fi
          echo "✅ All 5 required secrets are present."
        env:
          HOST: ${{ secrets.XSERVER_HOST }}
          USER: ${{ secrets.XSERVER_USER }}
          PORT: ${{ secrets.XSERVER_PORT }}
          REMOTE_PATH: ${{ secrets.XSERVER_PATH }}
          SSH_KEY: ${{ secrets.XSERVER_SSH_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build gallery JSON (if script exists)
        run: |
          if [ -f scripts/build-gallery.js ]; then
            echo "Running scripts/build-gallery.js"
            node scripts/build-gallery.js
          else
            echo "scripts/build-gallery.js not found - skipping"
          fi

      - name: Generate LINE bot config (from Secrets, not committed)
        env:
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p line/state
          {
            echo '<?php'
            echo '// 自動生成（GitHub Actions）: 編集しない。値は GitHub Secrets で管理。'
            echo 'return ['
            printf "    'channel_secret'       => '%s',\n" "$LINE_CHANNEL_SECRET"
            printf "    'channel_access_token' => '%s',\n" "$LINE_CHANNEL_ACCESS_TOKEN"
            printf "    'openai_api_key'       => '%s',\n" "$OPENAI_API_KEY"
            echo "    'staff_email'          => 'info@hayazai.com',"
            echo "    'from_email'           => 'info@hayazai.com',"
            echo '];'
          } > line/config.php
          echo "Generated line/config.php (secret set: $([ -n "$LINE_CHANNEL_SECRET" ] && echo yes || echo NO))"

      - name: Setup SSH key & known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='nouhin/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='node_modules/' \
            --exclude='scripts/' \
            --exclude='docs/' \
            --exclude='functions/' \
            --exclude='CLAUDE.md' \
            --exclude='README.md' \
            --exclude='CHANGES.md' \
            --exclude='*.bak' \
            --exclude='*.tmp' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy.sh' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='data/products.js.NEW*.draft' \
            --exclude='data/*.draft' \
            --exclude='line/config.sample.php' \
            --exclude='line/state/*.json' \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.XSERVER_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_PATH }}"

      - name: Verify deployment (HTTP 200)
        run: |
          set +e
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" https://hayazai.com/)
          echo "https://hayazai.com/ -> HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Top page did not return 200 (got $STATUS)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
