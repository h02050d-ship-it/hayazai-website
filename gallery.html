    tags: ['フローリング', '施工中', '炉裏', '収納'],
  },

let currentFilter = 'all';

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const filtered = currentFilter === 'all'
    ? GALLERY_ITEMS
    : GALLERY_ITEMS.filter(item => item.cat.includes(currentFilter));

  grid.innerHTML = filtered.map(item => `
    <div class="gallery-card" onclick="openModal(${item.id})">
      <div class="gallery-card-img-placeholder" style="padding:0;overflow:hidden;">
        <img src="${item.img}" alt="${item.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <div class="gallery-card-body">
        <div class="gallery-card-tag">${item.tags.slice(0, 2).join(' · ')}</div>
        <div class="gallery-card-title">${item.title}</div>
        <div class="gallery-card-desc">${item.location}</div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const item = GALLERY_ITEMS.find(x => x.id === id);
  if (!item) return;
  const imgArea = document.getElementById('modal-img');
  imgArea.className = 'modal-img-area';
  imgArea.style.cssText = 'padding:0;overflow:hidden;';
  imgArea.innerHTML = `<img src="${item.img}" alt="${item.title}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  document.getElementById('modal-title').textContent = item.title;
  document.getElementById('modal-desc').innerHTML =
    `<strong>使用商品：</strong>${item.product}<br>` +
    `<strong>施工場所：</strong>${item.location}<br><br>${item.desc}`;
  document.getElementById('modal-tags').innerHTML =
    item.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('gallery-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('gallery-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// フィルター
document.querySelectorAll('.gallery-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gallery-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
  });
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('gallery-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gallery-modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.addEventListener('DOMContentLoaded', renderGallery);
</script>
