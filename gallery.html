  <style>
    .gallery-filter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;

    }
    .gallery-filter-btn {
      padding: 8px 20px;
      border: 1px solid #e8ddd0;

    .gal-bg-bedroom   { background: linear-gradient(160deg, #d4b896 0%, #b08060 40%, #8a6848 100%); }

    .gal-bg-bathroom  { background: linear-gradient(160deg, #c0d8e0 0%, #88b0c0 40%, #5888a0 100%); }
    .gal-bg-office    { background: linear-gradient(160deg, #e0d0c0 0%, #c0a080 40%, #907050 100%); }
    .gal-bg-diy       { background: linear-gradient(160deg, #d0c8a0 0%, #a09868 40%, #786838 100%); }

    .gallery-card-img-placeholder {
      position: relative;
    }
    .gallery-card-img-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.05) 40px,

    .gallery-card-img-placeholder .gal-icon {

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 12px;
      max-width: 760px;
      width: 100%;
      overflow: hidden;
      position: relative;
      animation: modalIn 0.22s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: rgba(0,0,0,0.4);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-img-area {
      width: 100%;
      height: 360px;
    }
    .modal-info { padding: 20px 24px 24px; }
    .modal-info h3 {
      font-size: 1.1rem;
      color: var(--wood-dark);
      margin-bottom: 8px;
    }
    .modal-info p {
      font-size: 0.85rem;
      color: var(--text-mid);
      line-height: 1.8;
    }
    .modal-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .modal-tag {
      font-size: 0.72rem;
      background: var(--wood-pale);
      color: var(--wood-mid);
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 700;
    }

    /* CTA banner */
    .gallery-cta {
      background: linear-gradient(135deg, var(--wood-dark), var(--green-dark));
      color: var(--white);
      text-align: center;
      padding: 64px 40px;
    }
    .gallery-cta h2 {

      margin-bottom: 12px;
    }
    .gallery-cta p {
      font-size: 0.9rem;

<script>
const GALLERY_ITEMS = [
  {

    title: 'リビング・フローリング施工（無節）',
    cat: ['flooring', 'living'],
    bg: 'gal-bg-living',
    icon: '🏠',

    location: '静岡県浜松市 個人宅',
    desc: '20畳のリビングに無節A級品を施工。木目が均一で美しく、来客にも「高級感がある」と好評。床暖房対応の15mm厚を採用。',
    tags: ['フローリング15mm', '無節', 'リビング', '個人宅'],
  },
  {
    id: 2,
    title: '寝室・フローリング施工（小節）',
    cat: ['flooring', 'bedroom'],

    tags: ['フローリング15mm', '小節', '寝室', '注文住宅'],
  },
  {
    id: 3,
    title: '和室・羽目板施工（全面）',
    cat: ['panel', 'washitsu'],
    bg: 'gal-bg-washitsu',
    icon: '🎋',

    location: '静岡県磐田市 新築一戸建て',
    desc: '和室の壁面を全面桧羽目板で仕上げ。天井まで届く桧の壁は圧倒的な存在感。季節を問わず調湿効果が実感できると好評。',
    tags: ['羽目板', '小節', '和室', '壁面'],
  },
  {
    id: 4,
    title: '子ども部屋・フローリング施工',
    cat: ['flooring', 'kids'],
    bg: 'gal-bg-kids',
    icon: '🧸',
    product: 'フローリング 15mm 節有 B級品',
    location: '神奈川県横浜市 リフォーム',
    desc: '子どもが床で遊ぶことを考え、柔らかく温かい桧を選択。節有B級品でコストを抑えながら、素足感触は最高との声をいただきました。',
    tags: ['フローリング15mm', '節有', '子ども部屋', 'リフォーム'],
  },
  {
    id: 5,
    title: '廊下・フローリング施工（長尺）',
    cat: ['flooring'],
    bg: 'gal-bg-hallway',
    icon: '🚶',
    product: 'フローリング 12mm 小節 A級品',
    location: '東京都世田谷区 マンションリフォーム',
    desc: '廊下に12mm厚・長尺タイプを施工。薄型のため既存の床高との段差もなく、長い廊下に木目が映える仕上がりになりました。',
    tags: ['フローリング12mm', '小節', '廊下', 'マンション'],
  },
  {

    title: '壁面・羽目板施工（リビング）',
    cat: ['panel', 'living'],
    bg: 'gal-bg-wall',
    icon: '🪵',
    product: '羽目板 12mm 特上小 A級品',

    desc: 'カフェの壁面に特上小A級品の羽目板を施工。自然素材の温もりがお客様にも好評で、「木の香りがする」と来店者に話題に。',
    tags: ['羽目板', '特上小', 'リビング', '店舗'],
  },
  {
    id: 7,
    title: 'DIY施工・フローリング張り替え',
    cat: ['flooring', 'diy'],
    bg: 'gal-bg-diy',

    product: 'フローリング 15mm 節有 B級品',

    desc: '施主様自身でDIY施工。「超仕上げ」の仕上がりのよさで素人でも扱いやすく、フローリング施工が初めてでも綺麗に仕上がったとのこと。',
    tags: ['フローリング15mm', '節有', 'DIY', '個人宅'],
  },
  {
    id: 8,
    title: '浴室前・脱衣所フローリング',
    cat: ['flooring'],
    bg: 'gal-bg-bathroom',
    icon: '🛁',
    product: 'フローリング 12mm 無節 A級品',
    location: '静岡県静岡市 工務店施工',
    desc: '脱衣所に無節A級品を採用。桧は水に強い木材で、素足での気持ちよさが特に脱衣所で実感できます。防カビ処理を施した仕上げ。',
    tags: ['フローリング12mm', '無節', '脱衣所', '工務店'],
  },
  {
    id: 9,
    title: 'ホームオフィス・フローリング施工',
    cat: ['flooring'],
    bg: 'gal-bg-office',
    icon: '💻',
    product: 'フローリング 15mm 小節 A級品',
    location: '東京都港区 在宅ワークスペース',
    desc: '自宅オフィスに桧フローリングを採用。木の香りと温かみが集中力を高めるとのお声をいただきました。椅子キャスターも問題なし。',
    tags: ['フローリング15mm', '小節', 'オフィス', '個人宅'],
  },
];

let currentFilter = 'all';

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const filtered = currentFilter === 'all'
    ? GALLERY_ITEMS
    : GALLERY_ITEMS.filter(item => item.cat.includes(currentFilter));

  grid.innerHTML = filtered.map(item => `
    <div class="gallery-card" onclick="openModal(${item.id})">
      <div class="gallery-card-img-placeholder ${item.bg}">
        <span class="gal-icon">${item.icon}</span>
      </div>
      <div class="gallery-card-body">
        <div class="gallery-card-tag">${item.tags.slice(0, 2).join(' · ')}</div>
        <div class="gallery-card-title">${item.title}</div>
        <div class="gallery-card-desc">${item.location}</div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const item = GALLERY_ITEMS.find(x => x.id === id);
  if (!item) return;
  document.getElementById('modal-img').className = `modal-img-area ${item.bg}`;
  document.getElementById('modal-img').style.display = 'flex';
  document.getElementById('modal-img').style.alignItems = 'center';
  document.getElementById('modal-img').style.justifyContent = 'center';
  document.getElementById('modal-img').style.fontSize = '5rem';
  document.getElementById('modal-img').textContent = item.icon;
  document.getElementById('modal-title').textContent = item.title;
  document.getElementById('modal-desc').innerHTML =
    `<strong>使用商品：</strong>${item.product}<br>` +
    `<strong>施工場所：</strong>${item.location}<br><br>${item.desc}`;
  document.getElementById('modal-tags').innerHTML =
    item.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('gallery-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('gallery-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// フィルター
document.querySelectorAll('.gallery-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gallery-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
  });
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('gallery-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gallery-modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.addEventListener('DOMContentLoaded', renderGallery);
</script>
</body>
