<script>
const LENGTHS = [910, 1820, 3000, 4000];

const COLS = [
  { grade: 'A', quality: '節有',   bStart: false },
  { grade: 'A', quality: '小節',   bStart: false },
  { grade: 'A', quality: '特上小', bStart: false },
  { grade: 'A', quality: '無節',   bStart: false },
];

function exPrice(furiPrice) {
  return Math.round(furiPrice * 1.15 / 10) * 10;
}

function inPrice(furiPrice) {
  return Math.round(furiPrice * 1.15 * 1.1 / 10) * 10;
}

function lookup(cats, grade, quality, length) {
  return PRODUCTS.find(p =>
    cats.includes(p.cat) &&
    p.grade === grade &&
    p.quality === quality &&
    p.length === length
  );
}

function buildTbody(tbodyId, cats) {
  const tbody = document.getElementById(tbodyId);
  let html = '';
  LENGTHS.forEach(len => {
    html += `<tr><td class="td-length">${len.toLocaleString()}mm</td>`;
    COLS.forEach(col => {
      const p = lookup(cats, col.grade, col.quality, len);
      const bCls = col.bStart ? ' td-b-start' : '';
      if (!p) {
        html += `<td class="td-none${bCls}">—</td>`;
      } else if (p.outOfStock) {
        const ex = exPrice(p.price), inc = inPrice(p.price);
        html += `<td class="td-oos${bCls}">¥${ex.toLocaleString()}<small>（税込¥${inc.toLocaleString()}）${p.qty}枚入</small><span class="oos-label">在庫なし</span></td>`;
      } else {
        const ex = exPrice(p.price), inc = inPrice(p.price);
        html += `<td class="td-price${bCls}">¥${ex.toLocaleString()}<small>（税込¥${inc.toLocaleString()}）${p.qty}枚入</small></td>`;
      }
    });
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  buildTbody('tbody-flooring', ['flooring15', 'flooring12']);
  buildTbody('tbody-panel', ['panel']);
});
</script>
