<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="#3d2b1f"/>
  <!-- 年輪（木の断面） -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#c8a87a" stroke-width="1.2" opacity="0.35"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#c8a87a" stroke-width="1.4" opacity="0.5"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#c8a87a" stroke-width="1.6" opacity="0.65"/>
  <circle cx="32" cy="32" r="7"  fill="none" stroke="#c8a87a" stroke-width="1.8" opacity="0.8"/>
  <!-- 中心 -->
  <circle cx="32" cy="32" r="3"  fill="#c8a87a" opacity="0.9"/>
  <!-- 木目の縦線（髄線） -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#c8a87a" stroke-width="0.6" opacity="0.2"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#c8a87a" stroke-width="0.6" opacity="0.2"/>
</svg>
