<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご注文完了 | 林材木店</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<div style="max-width:640px;margin:80px auto;padding:40px;text-align:center;">
  <div style="font-size:3rem;margin-bottom:20px;">✅</div>
  <h1 style="font-family:'Noto Serif JP',serif;font-size:1.6rem;color:var(--wood-dark);margin-bottom:16px;">
    ご注文ありがとうございます
  </h1>
  <p style="color:var(--text-mid);line-height:1.9;margin-bottom:8px;">
    ご注文内容の確認メールをお送りしました。<br>
    振込先情報もメールに記載しておりますのでご確認ください。
  </p>
  <p id="order-no" style="font-size:0.85rem;color:var(--text-light);margin-bottom:32px;"></p>

  <div class="notice-box" style="text-align:left;margin-bottom:32px;">
    <h4>お支払い（銀行振込）</h4>
    遠州信用金庫　普通預金　***REDACTED***　***REDACTED***<br>
    振込確認後に発送いたします。振込手数料はお客様負担となります。
  </div>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <a href="index.html" class="btn btn-primary">トップページへ</a>
    <a href="products.html" class="btn btn-outline">引き続き買い物する</a>
  </div>
</div>

<div id="site-footer"></div>

<script src="data/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // 注文番号表示
  const params = new URLSearchParams(location.search);
  const order = params.get('order');
  if (order) {
    document.getElementById('order-no').textContent = `注文番号：${order}`;
  }
  // カートをクリア
  clearCart();
});
</script>
</body>
</html>
