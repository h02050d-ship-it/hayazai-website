<body>

<div id="site-header"></div>

<div style="max-width:640px;margin:80px auto;padding:40px;text-align:center;">
  <div style="width:72px;height:72px;border-radius:50%;background:#edf5ed;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="#4a7a4a" stroke-width="1.8"/>
      <path d="M7 12.5L10.5 16L17 9" stroke="#4a7a4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 style="font-family:'Noto Serif JP',serif;font-size:1.6rem;color:var(--wood-dark);margin-bottom:16px;">
    お見積もり依頼を受け付けました
  </h1>
  <p style="color:var(--text-mid);line-height:1.9;margin-bottom:8px;">
    受付内容の確認メールをお送りしました。<br>
    担当より、送料を含めた正式なお見積もり金額をメールでご案内いたします。
  </p>
  <p id="order-no" style="font-size:0.85rem;color:var(--text-light);margin-bottom:32px;"></p>

  <div class="notice-box" style="text-align:left;margin-bottom:32px;">
    <h4>このあとの流れ</h4>
    ① 当社より送料込みの正式なお見積もりをメールでご返信します。<br>
    ② 金額にご納得いただけましたら、あらためてご注文ください。<br>
    ③ ご注文確定後、お振込先をご案内し、ご入金確認後に発送いたします。<br>
    ※ この時点ではまだご注文は確定していません。お気軽にご相談ください。
  </div>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <a href="index.html" class="btn btn-primary">トップページへ</a>
    <a href="products.html" class="btn btn-outline">商品を見る</a>
  </div>
</div>

<div id="site-footer"></div>

<script src="data/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js?v=17"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // 注文番号表示
  const params = new URLSearchParams(location.search);
  const order = params.get('order');
  if (order) {
    document.getElementById('order-no').textContent = `受付番号：${order}`;
  }
  // カートをクリア
  clearCart();
});
</script>
